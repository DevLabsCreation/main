<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>DevLabs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome Link for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
    * {
      padding: 0;
      margin: 0;
      text-decoration: none;
      list-style: none;
      box-sizing: border-box;
    }
    body {
      font-family: "Montserrat", sans-serif;
      padding-top: 80px; /* Add padding to prevent content from being hidden behind the navbar */
    }
    nav {
      background: #0082e6;
      height: 80px;
      width: 100%;
      position: fixed;
      top: 0;
      z-index: 1000;
    }
    label.logo {
      color: white;
      font-size: 25px;
      line-height: 80px;
      padding: 0 100px;
      font-weight: bold;
    }
    nav ul {
      float: right;
      margin-right: 20px;
    }
    nav ul li {
      display: inline-block;
      line-height: 80px;
      margin: 0 5px;
    }
    nav ul li a {
      color: white;
      font-size: 17px;
      padding: 7px 13px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    nav a.active,
    nav a:hover {
      background: #1b9bff;
      transition: .5s;
    }
    .checkbtn {
      font-size: 22px;
      color: white;
      float: right;
      line-height: 80px;
      margin-right: 30px;
      cursor: pointer;
      display: none;
    }
    #check {
      display: none;
    }
    @media (max-width: 1050px) {
      label.logo {
        padding-left: 30px;
      }
      nav ul li a {
        font-size: 16px;
      }
    }
    @media (max-width: 890px) {
      .checkbtn {
        display: block;
      }
      label.logo {
        font-size: 22px;
      }
      ul {
        position: fixed;
        width: 100%;
        height: 100vh;
        background: #2c3e50;
        top: 80px;
        left: -100%;
        text-align: center;
        transition: all .5s;
      }
      nav ul li {
        display: block;
        margin: 50px 0;
        line-height: 30px;
      }
      nav ul li a {
        font-size: 20px;
      }
      a:hover,
      a.active {
        background: none;
      }
      #check:checked~ul {
        left: 0;
      }
    }
    @media (max-width: 600px) {
      nav ul li a {
        font-size: 14px;
      }
    }
    section#gallery {
      padding: 100px 0;
      background: #f4f4f4;
    }
    section#gallery .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }
    section#gallery h2 {
      text-align: center;
      font-size: 36px;
      margin-bottom: 20px;
      color: #333;
    }
    .thumbnails {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .thumbnails .thumbnail {
      margin: 10px;
      cursor: pointer;
    }
    .thumbnails .thumbnail img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .thumbnails .thumbnail:hover img {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }
    footer {
      background: #2c3e50;
      color: white;
      padding: 20px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav>
    <input type="checkbox" id="check">
    <label for="check" class="checkbtn">
      <i class="fas fa-bars"></i>
    </label>
    <label class="logo">DevLabs</label>
    <ul>
      <li><a href="index.htm">Home</a></li>
      <li><a href="devlabs-about-page.htm">About</a></li>
      <li><a href="devlabs-service-page.htm">Services</a></li>
      <li><a class="active" href="devlabs-gallery-page.htm">Gallery</a></li>
      <li><a href="devlabs-contact-page.htm">Contact</a></li>
    </ul>
  </nav>
  <section id="gallery">
    <div class="container">
      <h2>Gallery</h2>
      <p style="text-align: center; font-size: 18px; color: #555;">Discover our exclusive website templates, updated every month with a new theme. This month's theme: <strong>Modern Minimalism</strong>.</p>
      <div class="thumbnails">
        <div class="thumbnail">
          <picture>
            <img src="mainsection.png" alt="Main Section of Website">
          </picture>
        </div>
        <div class="thumbnail">
          <picture>
            <img src="aboutsection.png" alt="About Section of Website">
          </picture>
        </div>
        <div class="thumbnail">
          <picture>
            <img src="portfoliosection.png" alt="Portfolio Section of Website">
          </picture>
        </div>
        <div class="thumbnail">
          <picture>
            <img src="blogsection.png" alt="Blog Section of Website">
          </picture>
        </div>
        <div class="thumbnail">
          <picture>
            <img src="testimonialssection.png" alt="Testimonials Section of Website">
          </picture>
        </div>
      </div>
    </div>
  </section>
  <footer>
    <div class="container">
      <p>&copy; 2025 DevLabs. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
